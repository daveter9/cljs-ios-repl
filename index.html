<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLJS REPL">
  <meta name="theme-color" content="#1a1a1a">
  <title>ClojureScript REPL</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #1a1a1a; color: #e0e0e0;
      font-family: 'SF Mono', Menlo, Monaco, monospace;
      font-size: 14px; overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body {
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    button { -webkit-tap-highlight-color: rgba(95,179,179,0.3); touch-action: manipulation; }

    header {
      background: #0f0f0f; padding: 10px 14px;
      border-bottom: 1px solid #333;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; color: #5fb3b3; font-weight: 500; }
    header .actions { display: flex; gap: 6px; align-items: center; }
    header button {
      background: #2a2a2a; color: #e0e0e0; border: 1px solid #444;
      padding: 6px 10px; border-radius: 6px;
      font-family: inherit; font-size: 11px;
    }
    header button:active { background: #3a3a3a; }
    #status {
      font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #2a2a2a;
    }
    #status.online { background: #2a4a2a; color: #a3d977; }
    #status.offline { background: #4a3a2a; color: #e5b373; }
    #status.cached { background: #2a3a4a; color: #7db3e5; }

    #output {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .line { margin-bottom: 4px; line-height: 1.5; }
    .input-line { color: #e0e0e0; }
    .result { color: #a3d977; }
    .doc-result { color: #7db3e5; }
    .error { color: #e57373; white-space: pre-wrap; }
    .info { color: #888; font-style: italic; }

    #input-area {
      background: #0f0f0f; border-top: 1px solid #333;
      padding: 8px; flex-shrink: 0;
      display: flex; gap: 8px; align-items: flex-end;
    }
    #input {
      flex: 1; background: #1a1a1a; color: #e0e0e0;
      border: 1px solid #333; border-radius: 6px;
      padding: 8px 10px;
      font-family: inherit; font-size: 14px;
      resize: none; min-height: 38px; max-height: 140px; outline: none;
    }
    #input:focus { border-color: #5fb3b3; }
    #run {
      background: #5fb3b3; color: #0f0f0f; border: none;
      padding: 0 16px; height: 38px; border-radius: 6px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      flex-shrink: 0;
    }
    #run:active { background: #4a9a9a; }
    .toolbar {
      display: flex; gap: 6px; overflow-x: auto;
      padding: 6px 12px;
      background: #151515; border-bottom: 1px solid #222;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .toolbar button {
      background: #2a2a2a; color: #bbb; border: 1px solid #333;
      padding: 5px 10px; border-radius: 4px;
      font-family: inherit; font-size: 11px;
      white-space: nowrap;
    }
    .toolbar button:active { background: #3a3a3a; }

    /* Init screen */
    #init {
      position: fixed; inset: 0; background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; z-index: 200; text-align: center;
    }
    #init .lambda { font-size: 64px; color: #5fb3b3; margin-bottom: 16px; }
    #init h2 { color: #e0e0e0; font-size: 18px; margin-bottom: 8px; }
    #init .subtitle {
      color: #888; font-size: 13px; margin-bottom: 32px;
      max-width: 320px; line-height: 1.5;
    }
    #init .stage { color: #5fb3b3; font-size: 13px; margin-bottom: 12px; min-height: 18px; }
    #progress-wrap {
      width: 100%; max-width: 320px; height: 6px;
      background: #2a2a2a; border-radius: 3px;
      overflow: hidden; margin-bottom: 12px;
    }
    #progress {
      height: 100%; width: 0%; background: #5fb3b3;
      transition: width 0.2s ease;
    }
    #progress-text { color: #666; font-size: 11px; min-height: 14px; }
    #init .error-box {
      display: none;
      background: #3a1a1a; border: 1px solid #6a2a2a;
      color: #e57373; padding: 12px 16px; border-radius: 8px;
      margin-top: 16px; max-width: 320px;
      font-size: 12px; line-height: 1.5; text-align: left;
    }
    #init #retry {
      display: none; margin-top: 12px;
      background: #5fb3b3; color: #0f0f0f; border: none;
      padding: 10px 20px; border-radius: 6px;
      font-size: 13px; font-weight: 600;
    }

    /* ═══ Docs overlay ═══ */
    #docs {
      position: fixed; inset: 0; background: #1a1a1a;
      display: flex; flex-direction: column;
      z-index: 150;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #docs.open { transform: translateX(0); }

    #docs > header {
      background: #0f0f0f; padding: 10px 14px;
      border-bottom: 1px solid #333;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #docs-close {
      background: #2a2a2a; color: #e0e0e0; border: 1px solid #444;
      padding: 6px 12px; border-radius: 6px;
      font-family: inherit; font-size: 14px; font-weight: 600;
    }
    #docs-close:active { background: #3a3a3a; }
    #docs-title { font-size: 14px; color: #5fb3b3; flex: 1; font-weight: 500; }
    #docs-count { color: #666; font-size: 11px; }

    #docs-search-wrap {
      padding: 8px 12px;
      background: #151515;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    #docs-search {
      width: 100%;
      background: #2a2a2a; color: #e0e0e0;
      border: 1px solid #444; border-radius: 6px;
      padding: 8px 12px;
      font-family: inherit; font-size: 14px;
      outline: none;
    }
    #docs-search:focus { border-color: #5fb3b3; }

    #ns-filter {
      display: flex; gap: 5px; overflow-x: auto;
      padding: 6px 12px;
      background: #151515; border-bottom: 1px solid #222;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    #ns-filter::-webkit-scrollbar { display: none; }
    .ns-chip {
      background: #2a2a2a; color: #888; border: 1px solid #333;
      padding: 4px 10px; border-radius: 12px;
      font-family: inherit; font-size: 11px;
      white-space: nowrap;
    }
    .ns-chip.active { background: #5fb3b3; color: #0f0f0f; border-color: #5fb3b3; }

    #docs-list {
      flex: 1; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 8px;
    }
    #docs-loading {
      color: #666; padding: 40px 20px; text-align: center;
    }
    .doc-item {
      background: #222; border: 1px solid #2e2e2e;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: pointer;
    }
    .doc-item:active { background: #2a2a2a; }
    .doc-item.expanded { background: #1f2a2a; border-color: #3a5a5a; }
    .doc-row {
      display: flex; align-items: baseline; gap: 8px;
      flex-wrap: wrap;
    }
    .doc-name {
      color: #a3d977; font-weight: 600; font-size: 14px;
    }
    .doc-ns { color: #666; font-size: 10px; }
    .doc-tag {
      background: #4a3a2a; color: #e5b373;
      padding: 1px 6px; border-radius: 8px; font-size: 9px;
    }
    .doc-args {
      color: #7db3e5; font-size: 12px; margin-top: 4px;
      font-family: inherit;
    }
    .doc-text {
      color: #999; font-size: 12px; margin-top: 4px;
      line-height: 1.5;
    }
    .doc-item:not(.expanded) .doc-text {
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .doc-actions {
      display: none; margin-top: 8px; gap: 6px;
    }
    .doc-item.expanded .doc-actions { display: flex; }
    .doc-actions button {
      background: #2a4a4a; color: #5fb3b3; border: 1px solid #3a6a6a;
      padding: 5px 10px; border-radius: 4px;
      font-family: inherit; font-size: 11px;
    }
    .doc-actions button:active { background: #3a5a5a; }
  </style>
</head>
<body>
  <div id="init">
    <div class="lambda">λ</div>
    <h2>ClojureScript REPL</h2>
    <div class="subtitle">Eerste keer opstarten — ClojureScript wordt gedownload en opgeslagen voor offline gebruik.</div>
    <div class="stage" id="stage">Voorbereiden…</div>
    <div id="progress-wrap"><div id="progress"></div></div>
    <div id="progress-text"></div>
    <div class="error-box" id="error-box"></div>
    <button id="retry" onclick="initApp()">Opnieuw proberen</button>
  </div>

  <header>
    <h1>λ ClojureScript REPL</h1>
    <div class="actions">
      <span id="status">…</span>
      <button id="btn-docs">Docs</button>
      <button onclick="clearOutput()">Wis</button>
    </div>
  </header>

  <div class="toolbar">
    <button onclick="insertSnippet('(+ 1 2 3)')">(+ 1 2 3)</button>
    <button onclick="insertSnippet('(doc map)')">(doc map)</button>
    <button onclick="insertSnippet('(map inc [1 2 3])')">map</button>
    <button onclick="insertSnippet('(reduce + (range 100))')">reduce</button>
    <button onclick="insertSnippet('(defn square [x] (* x x))\n(square 7)')">defn</button>
    <button onclick="insertSnippet('(->> (range 20)\n     (map inc)\n     (filter even?)\n     (take 5))')">threading</button>
    <button onclick="insertSnippet('(for [x (range 3) y (range 3)] [x y])')">for</button>
  </div>

  <div id="output"></div>

  <div id="input-area">
    <textarea id="input" placeholder="(+ 1 2 3)" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
    <button id="run">Run</button>
  </div>

  <!-- Docs overlay -->
  <div id="docs">
    <header>
      <button id="docs-close">← Terug</button>
      <span id="docs-title">Documentation</span>
      <span id="docs-count"></span>
    </header>
    <div id="docs-search-wrap">
      <input id="docs-search" type="search" placeholder="Zoek functie of beschrijving…" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div id="ns-filter"></div>
    <div id="docs-list">
      <div id="docs-loading">Functies laden…</div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // Config
    // ═══════════════════════════════════════════════════════════════
    const SCITTLE_VERSION = '0.8.31';
    const SCITTLE_URL = `https://cdn.jsdelivr.net/npm/scittle@${SCITTLE_VERSION}/dist/scittle.min.js`;
    const CACHE_NAME = 'cljs-repl-assets-v1';

    const initScreen = document.getElementById('init');
    const stageEl = document.getElementById('stage');
    const progressEl = document.getElementById('progress');
    const progressText = document.getElementById('progress-text');
    const errorBox = document.getElementById('error-box');
    const retryBtn = document.getElementById('retry');
    const output = document.getElementById('output');
    const input = document.getElementById('input');
    const runBtn = document.getElementById('run');
    const statusEl = document.getElementById('status');

    function setStage(t) { stageEl.textContent = t; }
    function setProgress(p, t) {
      progressEl.style.width = p + '%';
      if (t !== undefined) progressText.textContent = t;
    }
    function showError(m) {
      errorBox.style.display = 'block';
      errorBox.textContent = m;
      retryBtn.style.display = 'inline-block';
      progressEl.style.background = '#e57373';
    }
    function hideError() {
      errorBox.style.display = 'none';
      retryBtn.style.display = 'none';
      progressEl.style.background = '#5fb3b3';
    }

    function updateStatus(suffix) {
      if (suffix === 'cached') { statusEl.textContent = 'offline-ready'; statusEl.className = 'cached'; }
      else if (navigator.onLine) { statusEl.textContent = 'online'; statusEl.className = 'online'; }
      else { statusEl.textContent = 'offline'; statusEl.className = 'offline'; }
    }
    window.addEventListener('online', () => updateStatus());
    window.addEventListener('offline', () => updateStatus());

    // ═══════════════════════════════════════════════════════════════
    // REPL
    // ═══════════════════════════════════════════════════════════════
    const history = [];
    let historyIdx = -1;

    function addLine(text, className = 'line') {
      const div = document.createElement('div');
      div.className = 'line ' + className;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function clearOutput() {
      output.innerHTML = '';
      addLine('ClojureScript REPL — type expressies hieronder', 'info');
      addLine('Tip: (doc map) voor documentatie, of tik op Docs rechtsboven', 'info');
    }

    function insertSnippet(code) {
      input.value = code;
      input.focus();
      autoResize();
    }

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    }
    input.addEventListener('input', autoResize);

    input.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        evaluate();
      } else if (e.key === 'ArrowUp' && input.value === '' && history.length > 0) {
        e.preventDefault();
        historyIdx = Math.max(0, historyIdx - 1);
        input.value = history[historyIdx] || '';
        autoResize();
      } else if (e.key === 'ArrowDown' && historyIdx >= 0) {
        e.preventDefault();
        historyIdx = Math.min(history.length, historyIdx + 1);
        input.value = history[historyIdx] || '';
        autoResize();
      }
    });

    function evaluate() {
      const code = input.value.trim();
      if (!code) return;

      addLine('=> ' + code, 'input-line');
      history.push(code);
      historyIdx = history.length;

      try {
        const result = scittle.core.eval_string(code);
        const isDocCall = /^\(doc\s/.test(code);
        let printed;
        if (isDocCall && typeof result === 'string') {
          // Show doc output raw, no pr_str quotes
          addLine(result, 'doc-result');
        } else {
          try { printed = scittle.core.pr_str(result); }
          catch (_) { printed = String(result); }
          addLine(printed, 'result');
        }
      } catch (err) {
        addLine('Error: ' + (err.message || String(err)), 'error');
      }

      input.value = '';
      autoResize();
      input.focus();
    }

    runBtn.addEventListener('click', (e) => { e.preventDefault(); evaluate(); });
    runBtn.addEventListener('touchend', (e) => { e.preventDefault(); evaluate(); });

    // ═══════════════════════════════════════════════════════════════
    // Init: download + cache Scittle
    // ═══════════════════════════════════════════════════════════════
    async function downloadWithProgress(url, onProgress) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const cl = response.headers.get('content-length');
      const total = cl ? parseInt(cl, 10) : 0;
      if (!total || !response.body || !response.body.getReader) {
        onProgress(null, 0);
        const blob = await response.blob();
        onProgress(null, blob.size);
        return blob;
      }
      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        onProgress(received / total, received);
      }
      return new Blob(chunks);
    }

    function formatBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
      return (n / 1024 / 1024).toFixed(2) + ' MB';
    }

    async function getCachedScittle() {
      if (!('caches' in window)) return null;
      try {
        const cache = await caches.open(CACHE_NAME);
        return (await cache.match(SCITTLE_URL)) || null;
      } catch { return null; }
    }

    async function cacheScittle(blob) {
      if (!('caches' in window)) return;
      try {
        const cache = await caches.open(CACHE_NAME);
        await cache.put(SCITTLE_URL,
          new Response(blob, { headers: { 'Content-Type': 'application/javascript' } }));
      } catch (e) { console.warn('cache fail:', e); }
    }

    function executeScript(code) {
      return new Promise((resolve, reject) => {
        try {
          const s = document.createElement('script');
          s.textContent = code;
          document.head.appendChild(s);
          setTimeout(() => {
            if (typeof scittle !== 'undefined' && scittle.core) resolve();
            else reject(new Error('Scittle niet geladen na script injectie'));
          }, 50);
        } catch (err) { reject(err); }
      });
    }

    // Install the (doc ...) macro and helpers at startup
    const DOC_MACRO_SETUP = `
      (defmacro doc [sym]
        \`(let [v# (resolve (quote ~sym))
               m# (meta v#)]
           (if v#
             (str "\\n" (:ns m#) "/" (:name m#) "\\n"
                  "  " (pr-str (:arglists m#))
                  (when (:macro m#) "\\n  [macro]")
                  (when (:doc m#) (str "\\n\\n  " (.replace (:doc m#) (js/RegExp. "\\\\n" "g") "\\n  "))))
             (str "Niet gevonden: " (quote ~sym)))))

      (defmacro dir [ns-sym]
        \`(let [ns# (find-ns (quote ~ns-sym))]
           (if ns#
             (->> (ns-publics ns#) keys sort (map str) (clojure.string/join "\\n"))
             (str "Namespace niet gevonden: " (quote ~ns-sym)))))
    `;

    async function setupHelpers() {
      try {
        scittle.core.eval_string(DOC_MACRO_SETUP);
      } catch (e) {
        console.warn('Helper setup failed:', e);
      }
    }

    async function initApp() {
      hideError();
      setProgress(0, '');
      try {
        setStage('Cache controleren…');
        setProgress(5);
        const cached = await getCachedScittle();
        let code;

        if (cached) {
          setStage('Uit cache laden…');
          setProgress(40, 'offline beschikbaar');
          code = await cached.text();
          setProgress(70);
        } else {
          if (!navigator.onLine) throw new Error('Geen internet. Eerste keer moet online zijn (~2 MB).');
          setStage('ClojureScript downloaden…');
          const blob = await downloadWithProgress(SCITTLE_URL, (pct, bytes) => {
            if (pct !== null) setProgress(5 + Math.round(pct * 55), formatBytes(bytes));
            else setProgress(30, formatBytes(bytes));
          });
          setStage('Opslaan…');
          setProgress(65);
          await cacheScittle(blob);
          setProgress(70);
          code = await blob.text();
        }

        setStage('Activeren…');
        setProgress(85);
        await executeScript(code);

        setStage('Helpers installeren…');
        setProgress(95);
        await setupHelpers();

        setStage('Klaar!');
        setProgress(100);
        updateStatus('cached');

        await new Promise(r => setTimeout(r, 300));
        initScreen.style.opacity = '0';
        initScreen.style.transition = 'opacity 0.3s';
        setTimeout(() => {
          initScreen.style.display = 'none';
          clearOutput();
        }, 300);
      } catch (err) {
        console.error('Init failed:', err);
        setStage('Opstarten mislukt');
        showError(err.message || String(err));
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    updateStatus();
    initApp();

    // ═══════════════════════════════════════════════════════════════
    // Docs panel
    // ═══════════════════════════════════════════════════════════════
    const docsOverlay = document.getElementById('docs');
    const docsList = document.getElementById('docs-list');
    const docsSearch = document.getElementById('docs-search');
    const docsCount = document.getElementById('docs-count');
    const nsFilter = document.getElementById('ns-filter');

    let docsIndex = null;
    let currentNs = 'all';

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function loadDocsIndex() {
      // Query Scittle for all public vars in all namespaces, with their metadata
      const queryCode = `
        (js/JSON.stringify
          (clj->js
            (vec (for [ns (all-ns)
                       :let [ns-name (str ns)]
                       [sym v] (ns-publics ns)
                       :when v]
                   {:ns ns-name
                    :name (str sym)
                    :doc (or (:doc (meta v)) "")
                    :arglists (let [al (:arglists (meta v))]
                                (if al (pr-str al) ""))
                    :macro (boolean (:macro (meta v)))}))))
      `;
      const jsonStr = scittle.core.eval_string(queryCode);
      const items = JSON.parse(jsonStr);
      // Sort: by ns first (core first), then by name
      items.sort((a, b) => {
        const nsOrder = (ns) => ns === 'clojure.core' ? '0' : (ns.startsWith('clojure.') ? '1' : '2') + ns;
        const o = nsOrder(a.ns).localeCompare(nsOrder(b.ns));
        if (o !== 0) return o;
        return a.name.localeCompare(b.name);
      });
      return items;
    }

    function renderNsFilter() {
      const nsSet = new Set(docsIndex.map(i => i.ns));
      const nsList = Array.from(nsSet).sort((a, b) => {
        if (a === 'clojure.core') return -1;
        if (b === 'clojure.core') return 1;
        return a.localeCompare(b);
      });
      nsFilter.innerHTML = '';
      const makeChip = (label, value) => {
        const b = document.createElement('button');
        b.className = 'ns-chip' + (value === currentNs ? ' active' : '');
        b.textContent = label;
        b.addEventListener('click', () => {
          currentNs = value;
          renderNsFilter();
          renderDocs();
        });
        nsFilter.appendChild(b);
      };
      makeChip('Alle', 'all');
      nsList.forEach(ns => makeChip(ns.replace('clojure.', ''), ns));
    }

    function renderDocs() {
      if (!docsIndex) return;
      const q = docsSearch.value.toLowerCase().trim();
      const items = docsIndex.filter(it => {
        if (currentNs !== 'all' && it.ns !== currentNs) return false;
        if (!q) return true;
        return it.name.toLowerCase().includes(q) ||
               (it.doc && it.doc.toLowerCase().includes(q));
      });
      docsCount.textContent = items.length;

      // Render in chunks to avoid UI freeze on first render (~800 items)
      docsList.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const it of items.slice(0, 200)) {
        frag.appendChild(makeDocItem(it));
      }
      docsList.appendChild(frag);

      // If more, append lazily
      if (items.length > 200) {
        const more = document.createElement('div');
        more.style.cssText = 'padding:12px;text-align:center;color:#666;font-size:12px;';
        more.textContent = '+ ' + (items.length - 200) + ' meer — verfijn zoekopdracht om te zien';
        docsList.appendChild(more);
      }
    }

    function makeDocItem(it) {
      const el = document.createElement('div');
      el.className = 'doc-item';
      const firstLine = it.doc ? it.doc.split('\n')[0] : '';
      el.innerHTML = `
        <div class="doc-row">
          <span class="doc-name">${escapeHtml(it.name)}</span>
          ${it.macro ? '<span class="doc-tag">macro</span>' : ''}
          <span class="doc-ns">${escapeHtml(it.ns)}</span>
        </div>
        ${it.arglists ? `<div class="doc-args">${escapeHtml(it.arglists)}</div>` : ''}
        ${it.doc ? `<div class="doc-text"></div>` : ''}
        <div class="doc-actions">
          <button data-action="insert-call">Gebruik in REPL</button>
          <button data-action="insert-doc">(doc) gebruiken</button>
        </div>
      `;
      // Set textContent so newlines are preserved
      const textEl = el.querySelector('.doc-text');
      if (textEl) textEl.textContent = it.doc;

      el.addEventListener('click', (e) => {
        const action = e.target.dataset.action;
        if (action === 'insert-call') {
          e.stopPropagation();
          closeDocs();
          insertSnippet('(' + it.name + ' )');
          // Position cursor just before the closing paren
          setTimeout(() => {
            input.focus();
            const pos = it.name.length + 2;
            input.setSelectionRange(pos, pos);
          }, 300);
        } else if (action === 'insert-doc') {
          e.stopPropagation();
          closeDocs();
          insertSnippet('(doc ' + it.name + ')');
        } else {
          el.classList.toggle('expanded');
        }
      });
      return el;
    }

    function openDocs() {
      docsOverlay.classList.add('open');
      if (!docsIndex) {
        docsList.innerHTML = '<div id="docs-loading">Functies laden…</div>';
        loadDocsIndex().then(items => {
          docsIndex = items;
          renderNsFilter();
          renderDocs();
        }).catch(err => {
          docsList.innerHTML = '<div id="docs-loading" style="color:#e57373;">Fout: ' + escapeHtml(err.message) + '</div>';
        });
      }
    }

    function closeDocs() {
      docsOverlay.classList.remove('open');
    }

    document.getElementById('btn-docs').addEventListener('click', openDocs);
    document.getElementById('docs-close').addEventListener('click', closeDocs);
    docsSearch.addEventListener('input', renderDocs);
  </script>
</body>
</html>
