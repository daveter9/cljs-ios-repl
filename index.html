<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CLJS REPL">
  <meta name="theme-color" content="#1a1a1a">
  <title>ClojureScript REPL</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'SF Mono', Menlo, Monaco, monospace;
      font-size: 14px;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    header {
      background: #0f0f0f;
      padding: 12px 16px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; color: #5fb3b3; font-weight: 500; }
    header .actions { display: flex; gap: 6px; align-items: center; }
    header button {
      background: #2a2a2a; color: #e0e0e0; border: 1px solid #444;
      padding: 6px 12px; border-radius: 6px;
      font-family: inherit; font-size: 12px; cursor: pointer;
    }
    header button:active { background: #3a3a3a; }
    #status {
      font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #2a2a2a;
    }
    #status.online { background: #2a4a2a; color: #a3d977; }
    #status.offline { background: #4a3a2a; color: #e5b373; }
    #status.cached { background: #2a3a4a; color: #7db3e5; }
    #output {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .line { margin-bottom: 4px; line-height: 1.5; }
    .input-line { color: #e0e0e0; }
    .result { color: #a3d977; }
    .error { color: #e57373; white-space: pre-wrap; }
    .info { color: #888; font-style: italic; }
    #input-area {
      background: #0f0f0f; border-top: 1px solid #333;
      padding: 8px; flex-shrink: 0;
      display: flex; gap: 8px; align-items: flex-end;
    }
    #input {
      flex: 1; background: #1a1a1a; color: #e0e0e0;
      border: 1px solid #333; border-radius: 6px;
      padding: 8px 10px;
      font-family: inherit; font-size: 14px;
      resize: none; min-height: 38px; max-height: 140px; outline: none;
    }
    #input:focus { border-color: #5fb3b3; }
    #run {
      background: #5fb3b3; color: #0f0f0f; border: none;
      padding: 0 16px; height: 38px; border-radius: 6px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; flex-shrink: 0;
    }
    #run:active { background: #4a9a9a; }
    .toolbar {
      display: flex; gap: 6px; overflow-x: auto;
      padding: 6px 12px;
      background: #151515; border-bottom: 1px solid #222;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }
    .toolbar button {
      background: #2a2a2a; color: #bbb; border: 1px solid #333;
      padding: 5px 10px; border-radius: 4px;
      font-family: inherit; font-size: 11px;
      white-space: nowrap; cursor: pointer;
    }
    .toolbar button:active { background: #3a3a3a; }

    /* Init screen */
    #init {
      position: fixed; inset: 0; background: #1a1a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; z-index: 100; text-align: center;
    }
    #init .lambda {
      font-size: 64px; color: #5fb3b3;
      margin-bottom: 16px; line-height: 1;
    }
    #init h2 {
      color: #e0e0e0; font-size: 18px; font-weight: 500; margin-bottom: 8px;
    }
    #init .subtitle {
      color: #888; font-size: 13px; margin-bottom: 32px;
      max-width: 320px; line-height: 1.5;
    }
    #init .stage {
      color: #5fb3b3; font-size: 13px; margin-bottom: 12px; min-height: 18px;
    }
    #progress-wrap {
      width: 100%; max-width: 320px; height: 6px;
      background: #2a2a2a; border-radius: 3px;
      overflow: hidden; margin-bottom: 12px;
    }
    #progress {
      height: 100%; width: 0%; background: #5fb3b3;
      transition: width 0.2s ease;
    }
    #progress-text {
      color: #666; font-size: 11px; min-height: 14px;
    }
    #init .error-box {
      display: none;
      background: #3a1a1a; border: 1px solid #6a2a2a;
      color: #e57373; padding: 12px 16px; border-radius: 8px;
      margin-top: 16px; max-width: 320px;
      font-size: 12px; line-height: 1.5; text-align: left;
    }
    #init #retry {
      display: none; margin-top: 12px;
      background: #5fb3b3; color: #0f0f0f; border: none;
      padding: 10px 20px; border-radius: 6px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="init">
    <div class="lambda">λ</div>
    <h2>ClojureScript REPL</h2>
    <div class="subtitle">Eerste keer opstarten — ClojureScript wordt nu gedownload en opgeslagen voor offline gebruik.</div>
    <div class="stage" id="stage">Voorbereiden…</div>
    <div id="progress-wrap"><div id="progress"></div></div>
    <div id="progress-text"></div>
    <div class="error-box" id="error-box"></div>
    <button id="retry" onclick="initApp()">Opnieuw proberen</button>
  </div>

  <header>
    <h1>λ ClojureScript REPL</h1>
    <div class="actions">
      <span id="status">…</span>
      <button onclick="clearOutput()">Wis</button>
    </div>
  </header>

  <div class="toolbar">
    <button onclick="insertSnippet('(+ 1 2 3)')">(+ 1 2 3)</button>
    <button onclick="insertSnippet('(map inc [1 2 3])')">map</button>
    <button onclick="insertSnippet('(reduce + (range 100))')">reduce</button>
    <button onclick="insertSnippet('(defn square [x] (* x x))\n(square 7)')">defn</button>
    <button onclick="insertSnippet('(filter odd? (range 10))')">filter</button>
    <button onclick="insertSnippet('(->> (range 20)\n     (map inc)\n     (filter even?)\n     (take 5))')">threading</button>
    <button onclick="insertSnippet('(for [x (range 3) y (range 3)] [x y])')">for</button>
    <button onclick="insertSnippet('(reduce-kv (fn [m k v] (assoc m v k)) {} {:a 1 :b 2})')">reduce-kv</button>
  </div>

  <div id="output"></div>

  <div id="input-area">
    <textarea id="input" placeholder="(+ 1 2 3)" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
    <button id="run" onclick="evaluate()">Run</button>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // Configuration
    // ═══════════════════════════════════════════════════════════════
    const SCITTLE_VERSION = '0.8.31';
    const SCITTLE_URL = `https://cdn.jsdelivr.net/npm/scittle@${SCITTLE_VERSION}/dist/scittle.min.js`;
    const CACHE_NAME = 'cljs-repl-assets-v1';

    // ═══════════════════════════════════════════════════════════════
    // UI refs
    // ═══════════════════════════════════════════════════════════════
    const initScreen = document.getElementById('init');
    const stageEl = document.getElementById('stage');
    const progressEl = document.getElementById('progress');
    const progressText = document.getElementById('progress-text');
    const errorBox = document.getElementById('error-box');
    const retryBtn = document.getElementById('retry');
    const output = document.getElementById('output');
    const input = document.getElementById('input');
    const statusEl = document.getElementById('status');

    function setStage(text) { stageEl.textContent = text; }
    function setProgress(pct, text) {
      progressEl.style.width = pct + '%';
      if (text !== undefined) progressText.textContent = text;
    }
    function showError(message) {
      errorBox.style.display = 'block';
      errorBox.textContent = message;
      retryBtn.style.display = 'inline-block';
      progressEl.style.background = '#e57373';
    }
    function hideError() {
      errorBox.style.display = 'none';
      retryBtn.style.display = 'none';
      progressEl.style.background = '#5fb3b3';
    }

    // ═══════════════════════════════════════════════════════════════
    // Network status
    // ═══════════════════════════════════════════════════════════════
    function updateStatus(suffix) {
      if (suffix === 'cached') {
        statusEl.textContent = 'offline-ready';
        statusEl.className = 'cached';
      } else if (navigator.onLine) {
        statusEl.textContent = 'online';
        statusEl.className = 'online';
      } else {
        statusEl.textContent = 'offline';
        statusEl.className = 'offline';
      }
    }
    window.addEventListener('online', () => updateStatus());
    window.addEventListener('offline', () => updateStatus());

    // ═══════════════════════════════════════════════════════════════
    // REPL core
    // ═══════════════════════════════════════════════════════════════
    const history = [];
    let historyIdx = -1;

    function addLine(text, className = 'line') {
      const div = document.createElement('div');
      div.className = 'line ' + className;
      div.textContent = text;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function clearOutput() {
      output.innerHTML = '';
      addLine('ClojureScript REPL — type expressies hieronder', 'info');
      addLine('Tip: Cmd/Ctrl + Enter om te evalueren, pijltje omhoog voor geschiedenis', 'info');
    }

    function insertSnippet(code) {
      input.value = code;
      input.focus();
      autoResize();
    }

    function autoResize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    }

    input.addEventListener('input', autoResize);
    input.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        evaluate();
      } else if (e.key === 'ArrowUp' && input.value === '' && history.length > 0) {
        e.preventDefault();
        historyIdx = Math.max(0, historyIdx - 1);
        input.value = history[historyIdx] || '';
        autoResize();
      } else if (e.key === 'ArrowDown' && historyIdx >= 0) {
        e.preventDefault();
        historyIdx = Math.min(history.length, historyIdx + 1);
        input.value = history[historyIdx] || '';
        autoResize();
      }
    });

    function evaluate() {
      const code = input.value.trim();
      if (!code) return;
      addLine('=> ' + code, 'input-line');
      history.push(code);
      historyIdx = history.length;
      try {
        const result = scittle.core.eval_string(code);
        let printed;
        try { printed = scittle.core.pr_str(result); }
        catch (_) { printed = String(result); }
        addLine(printed, 'result');
      } catch (err) {
        addLine('Error: ' + (err.message || String(err)), 'error');
      }
      input.value = '';
      autoResize();
      input.focus();
    }

    // ═══════════════════════════════════════════════════════════════
    // Init fase — download Scittle met progress, cache permanent
    // ═══════════════════════════════════════════════════════════════
    async function downloadWithProgress(url, onProgress) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} — ${response.statusText}`);
      }
      const contentLength = response.headers.get('content-length');
      const total = contentLength ? parseInt(contentLength, 10) : 0;

      // If no Content-Length, just wait for the blob
      if (!total || !response.body || !response.body.getReader) {
        onProgress(null, 0);
        const blob = await response.blob();
        onProgress(null, blob.size);
        return blob;
      }

      const reader = response.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        onProgress(received / total, received);
      }
      return new Blob(chunks);
    }

    function formatBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(0) + ' KB';
      return (n / 1024 / 1024).toFixed(2) + ' MB';
    }

    async function getCachedScittle() {
      if (!('caches' in window)) return null;
      try {
        const cache = await caches.open(CACHE_NAME);
        const res = await cache.match(SCITTLE_URL);
        return res || null;
      } catch { return null; }
    }

    async function cacheScittle(blob) {
      if (!('caches' in window)) return;
      try {
        const cache = await caches.open(CACHE_NAME);
        const response = new Response(blob, {
          headers: { 'Content-Type': 'application/javascript' }
        });
        await cache.put(SCITTLE_URL, response);
      } catch (err) {
        console.warn('Cache put failed:', err);
      }
    }

    function executeScript(code) {
      return new Promise((resolve, reject) => {
        try {
          const script = document.createElement('script');
          script.textContent = code;
          document.head.appendChild(script);
          if (typeof scittle !== 'undefined' && scittle.core) {
            resolve();
          } else {
            reject(new Error('Scittle niet geladen na uitvoeren van script'));
          }
        } catch (err) {
          reject(err);
        }
      });
    }

    async function initApp() {
      hideError();
      setProgress(0, '');

      try {
        // Stage 1: check cache
        setStage('Cache controleren…');
        setProgress(5);
        const cached = await getCachedScittle();
        let scittleCode;

        if (cached) {
          setStage('Uit cache laden…');
          setProgress(40, 'offline versie gevonden');
          scittleCode = await cached.text();
          setProgress(70);
        } else {
          if (!navigator.onLine) {
            throw new Error('Geen internetverbinding. De eerste keer moet je online zijn om ClojureScript te downloaden (~2 MB). Daarna werkt alles offline.');
          }
          setStage('ClojureScript downloaden…');
          setProgress(5, 'verbinden met CDN');

          const blob = await downloadWithProgress(SCITTLE_URL, (pct, bytes) => {
            if (pct !== null) {
              const displayPct = 5 + Math.round(pct * 55); // 5 → 60%
              setProgress(displayPct, formatBytes(bytes));
            } else {
              setProgress(30, formatBytes(bytes));
            }
          });

          setStage('Opslaan voor offline gebruik…');
          setProgress(65, formatBytes(blob.size));
          await cacheScittle(blob);
          setProgress(70);
          scittleCode = await blob.text();
        }

        // Stage 3: execute
        setStage('ClojureScript activeren…');
        setProgress(85);
        await executeScript(scittleCode);

        // Stage 4: done
        setStage('Klaar!');
        setProgress(100);
        updateStatus('cached');

        await new Promise(r => setTimeout(r, 300));
        initScreen.style.opacity = '0';
        initScreen.style.transition = 'opacity 0.3s';
        setTimeout(() => {
          initScreen.style.display = 'none';
          clearOutput();
          addLine('Klaar! Probeer: (+ 1 2 3)', 'info');
          input.focus();
        }, 300);

      } catch (err) {
        console.error('Init failed:', err);
        setStage('Opstarten mislukt');
        showError(err.message || String(err));
      }
    }

    // Register Service Worker for offline app shell
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    updateStatus();
    initApp();
  </script>
</body>
</html>
